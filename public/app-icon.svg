<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Домашнє меню іконка</title>
  <desc id="desc">Іконка з тарілкою, прибором та галочкою планування меню.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4c2" />
      <stop offset="100%" stop-color="#ffd84d" />
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f4f4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <circle cx="256" cy="262" r="168" fill="url(#plate)" />
    <circle cx="256" cy="262" r="124" fill="#fffef8" stroke="#ebebeb" stroke-width="10" />
  </g>

  <rect x="154" y="166" width="26" height="190" rx="13" fill="#181818" />
  <rect x="200" y="166" width="26" height="190" rx="13" fill="#181818" />
  <rect x="246" y="166" width="26" height="190" rx="13" fill="#181818" />

